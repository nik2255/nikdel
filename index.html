<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Website</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: #121212;
            color: #ffffff;
            line-height: 1.6;
        }

        header {
            background: #1e1e1e;
            padding: 20px;
            text-align: center;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin: 0 10px;
        }

        main {
            max-width: 1000px;
            margin: 40px auto;
            padding: 0 20px;
        }

        section {
            margin-bottom: 40px;
        }

        button {
            padding: 10px 20px;
            border: none;
            background: #0078d4;
            color: white;
            cursor: pointer;
            border-radius: 5px;
        }

        button:hover {
            background: #005ea6;
        }

        footer {
            text-align: center;
            padding: 20px;
            background: #1e1e1e;
            margin-top: 40px;
        }
    </style>
</head>
<body>

<header>
    <h1>My Website</h1>
    <nav>
        <a href="#home">Home</a>
        <a href="#about">About</a>
        <a href="#contact">Contact</a>
    </nav>
</header>

<main>
    <section id="home">
        <h2>Home</h2>
        <p>Welcome to my website.</p>
        <button onclick="hello()">Click Me</button>
    </section>

    <section id="about">
        <h2>About</h2>
        <p>Write something about your website here.</p>
    </section>

    <section id="contact">
        <h2>Contact</h2>
        <p>Email: example@email.com</p>
    </section>
</main>

<footer>
    &copy; 2026 My Website
</footer>

<script>
function hello() {
    alert("Hello, World!");
}
</script>

</body>
</html>
