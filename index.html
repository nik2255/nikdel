<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ابراهیم نیکدل مقدم</title>

<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

:root{
    --background:#f4f6f9;
    --card:white;
    --text:#111;
    --secondary:#666;
    --border:#e5e5e5;
}

.dark{
    --background:#121212;
    --card:#1e1e1e;
    --text:#f5f5f5;
    --secondary:#aaa;
    --border:#333;
}

body{
    background:var(--background);
    font-family:"Vazirmatn",sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
    transition:.3s;
}

.container{
    width:900px;
    max-width:100%;
    min-height:600px;
    background:var(--card);
    border-radius:18px;
    overflow:hidden;
    display:flex;
    box-shadow:0 15px 40px rgba(0,0,0,.15);
    transition:.3s;
}

.sidebar{
    width:270px;
    flex-shrink:0;
    background:var(--card);
    border-left:1px solid var(--border);
}

.logo{
    font-size:38px;
    text-align:center;
    padding:35px 20px;
    border-bottom:1px solid var(--border);
    color:var(--text);
    line-height:1.6;
}

.menu{
    list-style:none;
}

.menu li{
    border-bottom:1px solid var(--border);
}

.menu a{
    display:block;
    text-decoration:none;
    color:var(--text);
    padding:20px;
    transition:.25s;
    font-size:18px;
}

.menu a:hover{
    background:#111;
    color:white;
    padding-right:35px;
}

.content{
    flex:1;
    padding:60px;
}

.content h1{
    color:var(--text);
    font-size:38px;
    margin-bottom:20px;
}

.content p{
    color:var(--secondary);
    line-height:2;
}


.theme-switch{
    margin:25px;
    padding:12px;
    border-radius:10px;
    border:1px solid var(--border);
    background:var(--card);
    color:var(--text);
    cursor:pointer;
    font-family:"Vazirmatn";
    font-size:16px;
    width:calc(100% - 50px);
}


/* Mobile compatibility */

@media(max-width:768px){

    body{
        padding:10px;
    }

    .container{
        flex-direction:column;
        min-height:auto;
        width:100%;
    }


    .sidebar{
        width:100%;
        border-left:none;
        border-bottom:1px solid var(--border);
    }


    .logo{
        font-size:30px;
        padding:25px 15px;
    }


    .menu a{
        font-size:16px;
        padding:16px;
    }


    .content{
        padding:30px 20px;
        text-align:right;
    }


    .content h1{
        font-size:30px;
    }


    .content p{
        font-size:15px;
    }

}


@media(max-width:400px){

    .logo{
        font-size:25px;
    }

    .content h1{
        font-size:26px;
    }

}

</style>

</head>


<body>


<div class="container">


<div class="content">

<h1>خوش آمدید</h1>

<p>
محتوای صفحه اینجا قرار می‌گیرد.
</p>

</div>



<div class="sidebar">


<div class="logo">
ابراهیم نیکدل مقدم
</div>



<ul class="menu">

<li><a href="#">وکیل پایه یک دادگستری</a></li>

<li><a href="#">مقالات</a></li>

<li><a href="#">مباحث حقوقی</a></li>

<li><a href="#">تماس با ما</a></li>

</ul>



<button class="theme-switch" onclick="toggleTheme()">
🌙 حالت تاریک
</button>


</div>


</div>



<script>

function toggleTheme(){

document.body.classList.toggle("dark");

let button=document.querySelector(".theme-switch");

if(document.body.classList.contains("dark")){

button.innerHTML="☀️ حالت روشن";
localStorage.setItem("theme","dark");

}

else{

button.innerHTML="🌙 حالت تاریک";
localStorage.setItem("theme","light");

}

}



window.onload=function(){

if(localStorage.getItem("theme")=="dark"){

document.body.classList.add("dark");

document.querySelector(".theme-switch").innerHTML="☀️ حالت روشن";

}

}

</script>


</body>
</html>
