<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ابراهیم نیکدل مقدم</title>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;700&family=Noto+Nastaliq+Urdu:wght@600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --background: #f3f4f6;
            --card: white;
            --text: #111;
            --secondary: #666;
            --border: #ddd;
            --scale-main: #6b7280;
            --scale-accent: #9ca3af;
            --scale-light: #d1d5db;
            --scale-shadow: rgba(0,0,0,0.15);
            --plate-bg: #f9fafb;
            --plate-border: #9ca3af;
        }

        .dark {
            --background: #101010;
            --card: #1c1c1c;
            --text: #f5f5f5;
            --secondary: #aaa;
            --border: #333;
            --scale-main: #e5e7eb;
            --scale-accent: #d1d5db;
            --scale-light: #f3f4f6;
            --scale-shadow: rgba(0,0,0,0.5);
            --plate-bg: #1f2937;
            --plate-border: #e5e7eb;
        }

        html, body {
            overflow-x: hidden;
            width: 100%;
            position: relative;
        }

        body {
            background: var(--background);
            font-family: "Vazirmatn", sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
            transition: .35s;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        .container {
            width: 1000px;
            max-width: 100%;
            min-height: 620px;
            background: var(--card);
            border-radius: 22px;
            overflow: hidden;
            display: flex;
            box-shadow: 0 20px 50px rgba(0, 0, 0, .12);
            transition: .35s;
        }

        .sidebar {
            width: 300px;
            min-width: 300px;
            background: var(--card);
            border-left: 1px solid var(--border);
            transition: .35s;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        .logo {
            font-family: "Noto Nastaliq Urdu", serif;
            font-size: 42px;
            text-align: center;
            color: var(--text);
            padding: 35px 20px;
            line-height: 2;
            border-bottom: 1px solid var(--border);
            transition: .35s;
        }

        .menu {
            list-style: none;
            flex: 1;
        }

        .menu li {
            border-bottom: 1px solid var(--border);
        }

        .menu a {
            display: block;
            text-decoration: none;
            color: var(--text);
            padding: 20px 25px;
            font-size: 18px;
            transition: .25s;
            position: relative;
        }

        .menu a:hover {
            background: var(--text);
            color: var(--card);
            padding-right: 35px;
        }

        .menu a:active {
            transform: scale(0.98);
        }

        .content {
            flex: 1;
            padding: 50px 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            min-width: 0;
        }

        .content h1 {
            color: var(--text);
            font-size: 42px;
            margin-bottom: 20px;
            text-align: center;
            transition: .35s;
        }

        .content p {
            color: var(--secondary);
            line-height: 2.2;
            text-align: center;
            transition: .35s;
            max-width: 500px;
        }

        /* Polished Interactive Justice Scale */
        .justice-scale-container {
            display: flex;
            justify-content: center;
            margin-top: 30px;
        }

        .justice-scale {
            position: relative;
            width: 240px;
            height: 280px;
            cursor: pointer;
            transition: transform 0.3s;
        }

        .justice-scale:active {
            transform: scale(0.97);
        }

        /* Base platform */
        .scale-base {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 160px;
            height: 14px;
            background: linear-gradient(to bottom, var(--scale-accent), var(--scale-main));
            border-radius: 4px;
            box-shadow: 0 4px 6px var(--scale-shadow);
            transition: all 0.35s;
        }

        .scale-base::after {
            content: '';
            position: absolute;
            top: -6px;
            left: 50%;
            transform: translateX(-50%);
            width: 90px;
            height: 8px;
            background: linear-gradient(to bottom, var(--scale-light), var(--scale-accent));
            border-radius: 3px;
            transition: all 0.35s;
        }

        /* Vertical pole */
        .scale-pole {
            position: absolute;
            bottom: 16px;
            left: 50%;
            transform: translateX(-50%);
            width: 10px;
            height: 180px;
            background: linear-gradient(to right, var(--scale-main), var(--scale-accent), var(--scale-main));
            border-radius: 3px;
            box-shadow: 0 2px 4px var(--scale-shadow);
            transition: all 0.35s;
        }

        .scale-pole::before {
            content: '';
            position: absolute;
            top: 25px;
            left: 50%;
            transform: translateX(-50%);
            width: 20px;
            height: 20px;
            background: radial-gradient(circle, var(--scale-accent), var(--scale-main));
            border-radius: 50%;
            box-shadow: 0 2px 4px var(--scale-shadow);
            transition: all 0.35s;
        }

        /* Top ornament */
        .scale-ornament {
            position: absolute;
            top: 2px;
            left: 50%;
            transform: translateX(-50%);
            width: 24px;
            height: 24px;
            background: radial-gradient(circle, var(--scale-light), var(--scale-accent));
            border-radius: 50%;
            box-shadow: 0 3px 6px var(--scale-shadow);
            z-index: 2;
            transition: all 0.35s;
        }

        .scale-ornament::after {
            content: '';
            position: absolute;
            top: -4px;
            left: 50%;
            transform: translateX(-50%);
            width: 10px;
            height: 10px;
            background: radial-gradient(circle, var(--scale-light), var(--scale-accent));
            border-radius: 50%;
            transition: all 0.35s;
        }

        /* Beam */
        .scale-beam {
            position: absolute;
            top: 40px;
            left: 15px;
            width: 210px;
            height: 12px;
            background: linear-gradient(to bottom, var(--scale-accent), var(--scale-main));
            border-radius: 4px;
            box-shadow: 0 4px 8px var(--scale-shadow);
            transform-origin: center center;
            transition: transform 0.5s cubic-bezier(0.68, -0.55, 0.27, 1.55);
        }

        .scale-beam.pulled-left {
            transform: rotate(-8deg);
        }

        .scale-beam.pulled-right {
            transform: rotate(8deg);
        }

        /* Chains */
        .chain-left, .chain-right {
            position: absolute;
            top: 12px;
            width: 3px;
            height: 75px;
            background: repeating-linear-gradient(
                to bottom,
                var(--scale-accent) 0px,
                var(--scale-accent) 4px,
                var(--scale-light) 4px,
                var(--scale-light) 8px
            );
            border-radius: 1px;
            transition: all 0.35s;
        }

        .chain-left {
            left: 30px;
        }

        .chain-right {
            right: 30px;
        }

        /* Hanging plates */
        .plate-left, .plate-right {
            position: absolute;
            top: 87px;
            width: 85px;
            height: 55px;
            background: linear-gradient(180deg, var(--plate-bg) 0%, var(--card) 100%);
            border: 3px solid var(--plate-border);
            border-radius: 0 0 12px 12px;
            box-shadow: 0 6px 12px var(--scale-shadow), inset 0 2px 4px rgba(255,255,255,0.05);
            transition: all 0.5s cubic-bezier(0.68, -0.55, 0.27, 1.55);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .plate-left {
            left: 7px;
        }

        .plate-right {
            right: 7px;
        }

        .plate-left.pulled {
            transform: translateY(15px);
        }

        .plate-right.pulled {
            transform: translateY(15px);
        }

        /* Plate strings */
        .plate-left::before, .plate-right::before,
        .plate-left::after, .plate-right::after {
            content: '';
            position: absolute;
            top: -28px;
            width: 2px;
            height: 28px;
            background: var(--scale-accent);
            transition: all 0.35s;
        }

        .plate-left::before {
            left: 10px;
        }

        .plate-left::after {
            right: 10px;
        }

        .plate-right::before {
            left: 10px;
        }

        .plate-right::after {
            right: 10px;
        }

        /* Decorative dot in plates */
        .plate-dot {
            width: 12px;
            height: 12px;
            background: var(--scale-main);
            border-radius: 50%;
            transition: all 0.5s;
            animation: pulse 2s ease-in-out infinite;
            box-shadow: 0 2px 4px var(--scale-shadow);
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.7; }
            50% { transform: scale(1.3); opacity: 1; }
        }

        .plate-left .plate-dot {
            animation-delay: 0s;
        }

        .plate-right .plate-dot {
            animation-delay: 1s;
        }

        /* Interaction hint */
        .scale-hint {
            text-align: center;
            color: var(--secondary);
            font-size: 13px;
            margin-top: 15px;
            opacity: 0.8;
            transition: all 0.35s;
        }

        /* button */
        .theme-container {
            padding: 25px;
            border-top: 1px solid var(--border);
            transition: .35s;
        }

        .theme-switch {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: var(--card);
            color: var(--text);
            cursor: pointer;
            font-family: "Vazirmatn", sans-serif;
            font-size: 15px;
            transition: 0.25s;
        }

        .theme-switch:hover {
            background: var(--text);
            color: var(--card);
        }

        .theme-switch:active {
            transform: scale(0.96);
        }

        /* Mobile styles */
        @media(max-width:768px) {
            body {
                padding: 8px;
                align-items: flex-start;
            }

            .container {
                flex-direction: column;
                border-radius: 16px;
                min-height: auto;
            }

            .sidebar {
                width: 100%;
                min-width: 100%;
                border-left: none;
                border-bottom: 1px solid var(--border);
            }

            .logo {
                font-size: 30px;
                padding: 25px 15px;
            }

            .menu a {
                padding: 16px 20px;
                font-size: 16px;
            }

            .content {
                padding: 30px 20px;
            }

            .content h1 {
                font-size: 28px;
                margin-bottom: 12px;
            }

            .content p {
                font-size: 14px;
                line-height: 2;
                max-width: 100%;
            }

            .justice-scale {
                width: 200px;
                height: 240px;
            }

            .scale-beam {
                width: 170px;
                left: 15px;
                top: 35px;
            }

            .chain-left {
                left: 25px;
            }

            .chain-right {
                right: 25px;
            }

            .plate-left, .plate-right {
                width: 70px;
                height: 45px;
                top: 80px;
            }

            .plate-left {
                left: 7px;
            }

            .plate-right {
                right: 7px;
            }

            .scale-base {
                width: 130px;
            }

            .scale-base::after {
                width: 70px;
            }

            .scale-pole {
                height: 150px;
            }

            .theme-container {
                padding: 18px;
            }

            .scale-hint {
                font-size: 11px;
                margin-top: 10px;
            }
        }

        @media(max-width:380px) {
            .content {
                padding: 20px 12px;
            }

            .justice-scale {
                width: 170px;
                height: 210px;
            }

            .scale-beam {
                width: 140px;
                left: 15px;
                height: 10px;
            }

            .plate-left, .plate-right {
                width: 60px;
                height: 38px;
                top: 70px;
            }

            .scale-pole {
                height: 130px;
                width: 8px;
            }

            .chain-left, .chain-right {
                height: 60px;
            }

            .plate-left::before, .plate-right::before,
            .plate-left::after, .plate-right::after {
                height: 22px;
                top: -22px;
            }

            .plate-dot {
                width: 10px;
                height: 10px;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="content">
            <h1>
                خوش آمدید
            </h1>
            <p>
                محتوای صفحه اینجا قرار می‌گیرد. برای اطلاعات بیشتر می‌توانید از بخش‌های مختلف سایت دیدن فرمایید.
            </p>

            <!-- ترازوی عدالت تمیز و منطبق با تم -->
            <div class="justice-scale-container" id="scaleContainer">
                <div class="justice-scale" id="justiceScale">
                    <div class="scale-ornament"></div>
                    <div class="scale-beam" id="scaleBeam">
                        <span class="chain-left"></span>
                        <span class="chain-right"></span>
                    </div>
                    <div class="plate-left" id="plateLeft">
                        <div class="plate-dot"></div>
                    </div>
                    <div class="plate-right" id="plateRight">
                        <div class="plate-dot"></div>
                    </div>
                    <div class="scale-pole"></div>
                    <div class="scale-base"></div>
                </div>
            </div>
            <p class="scale-hint">👆 روی کفه‌های ترازو کلیک کنید یا لمس کنید</p>
        </div>

        <div class="sidebar">
            <div class="logo">
                ابراهیم نیکدل مقدم
            </div>
            <ul class="menu">
                <li><a href="#">وکیل پایه یک دادگستری</a></li>
                <li><a href="about:blank" target="_blank">مقالات</a></li>
                <li><a href="#">مباحث حقوقی</a></li>
                <li><a href="#">تماس با ما</a></li>
            </ul>
            <div class="theme-container">
                <button class="theme-switch" onclick="toggleTheme()">
                    🌙 حالت تاریک
                </button>
            </div>
        </div>
    </div>

    <script>
        // Theme toggle
        function toggleTheme() {
            document.body.classList.toggle("dark");
            let button = document.querySelector(".theme-switch");
            if (document.body.classList.contains("dark")) {
                button.innerHTML = "☀️ حالت روشن";
                localStorage.setItem("theme", "dark");
            } else {
                button.innerHTML = "🌙 حالت تاریک";
                localStorage.setItem("theme", "light");
            }
        }

        // Load saved theme
        window.onload = function() {
            if (localStorage.getItem("theme") == "dark") {
                document.body.classList.add("dark");
                document.querySelector(".theme-switch").innerHTML = "☀️ حالت روشن";
            }
            initScaleInteraction();
        }

        // Interactive scale logic
        function initScaleInteraction() {
            const scaleBeam = document.getElementById('scaleBeam');
            const plateLeft = document.getElementById('plateLeft');
            const plateRight = document.getElementById('plateRight');

            function pullLeft() {
                // Reset right side
                scaleBeam.classList.remove('pulled-right');
                plateRight.classList.remove('pulled');
                
                // Pull left
                scaleBeam.classList.add('pulled-left');
                plateLeft.classList.add('pulled');
                
                // Reset after delay
                setTimeout(() => {
                    scaleBeam.classList.remove('pulled-left');
                    plateLeft.classList.remove('pulled');
                }, 800);
            }

            function pullRight() {
                // Reset left side
                scaleBeam.classList.remove('pulled-left');
                plateLeft.classList.remove('pulled');
                
                // Pull right
                scaleBeam.classList.add('pulled-right');
                plateRight.classList.add('pulled');
                
                // Reset after delay
                setTimeout(() => {
                    scaleBeam.classList.remove('pulled-right');
                    plateRight.classList.remove('pulled');
                }, 800);
            }

            // Click events for plates
            plateLeft.addEventListener('click', (e) => {
                e.stopPropagation();
                pullLeft();
            });

            plateRight.addEventListener('click', (e) => {
                e.stopPropagation();
                pullRight();
            });

            // Touch events for mobile
            plateLeft.addEventListener('touchstart', (e) => {
                e.stopPropagation();
                e.preventDefault();
                pullLeft();
            });

            plateRight.addEventListener('touchstart', (e) => {
                e.stopPropagation();
                e.preventDefault();
                pullRight();
            });

            // Prevent double-tap zoom on plates
            plateLeft.addEventListener('touchend', (e) => e.preventDefault());
            plateRight.addEventListener('touchend', (e) => e.preventDefault());
        }
    </script>
</body>

</html>
