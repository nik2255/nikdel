<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ابراهیم نیکدل مقدم</title>

<link href="https://fonts.googleapis.com/css2?family=Lalezar&family=Vazirmatn:wght@300;400;500&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#f4f6f9;
    font-family:"Vazirmatn",sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container{
    width:900px;
    height:600px;
    background:white;
    border-radius:18px;
    overflow:hidden;
    display:flex;
    box-shadow:0 15px 40px rgba(0,0,0,.15);
}

.sidebar{
    width:270px;
    background:white;
    border-left:1px solid #e5e5e5;
}

.logo{
    font-family:"Lalezar",cursive;
    font-size:42px;
    text-align:center;
    padding:35px 20px;
    border-bottom:1px solid #ececec;
}

.menu{
    list-style:none;
}

.menu li{
    border-bottom:1px solid #ececec;
}

.menu a{
    display:block;
    text-decoration:none;
    color:#222;
    padding:22px;
    transition:.25s;
    font-size:18px;
}

.menu a:hover{
    background:#111;
    color:white;
    padding-right:35px;
}

.content{
    flex:1;
    padding:60px;
}

.content h1{
    font-size:38px;
    margin-bottom:20px;
}

.content p{
    color:#666;
    line-height:2;
}

</style>
</head>

<body>

<div class="container">

<div class="content">

<h1>خوش آمدید</h1>

<p>
محتوای صفحه اینجا قرار می‌گیرد.
</p>

</div>

<div class="sidebar">

<div class="logo">
ابراهیم نیکدل مقدم
</div>

<ul class="menu">

<li><a href="#">وکیل پایه یک دادگستری</a></li>

<li><a href="#">مقالات</a></li>

<li><a href="#">مباحث حقوقی</a></li>

<li><a href="#">تماس با ما</a></li>

</ul>

</div>

</div>

</body>
</html>
